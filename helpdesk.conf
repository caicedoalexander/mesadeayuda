<VirtualHost *:80>
     ServerAdmin asesor.tics@operadoracafetera.com
     ServerName mesadeayuda.copcsa.com
     DocumentRoot /var/www/html/webroot
     DirectoryIndex index.php
    
    <Directory /var/www/html/webroot >
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Order allow,deny
        allow from all
     </Directory>

     ErrorLog /var/log/apache2/helpdesk-error.log
     CustomLog /var/log/apache2/helpdesk-warning.log combined
</VirtualHost>
