name: COPCSA CI/CD Pipeline MESA DE AYUDA V1

on:
  push:
    branches:
      - main
      - dev
      - hotfix
      - staging

jobs:

  ci:
    runs-on: self-hosted
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: .Env Configuration
        run: |
          sudo cp /root/secrets/.env.helpdesk.prod ${{ github.workspace }}/config/.env
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: docker build
        run: |
          sudo docker build -t ${{ secrets.DOCKER_USER }}/mesadeayuda:${{ github.sha }} .
      - name: docker push
        run: |
          sudo docker push ${{ secrets.DOCKER_USER }}/mesadeayuda:${{ github.sha }}

  generate_matrix:
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      matrix: ${{ steps.set-hostnames.outputs.matrix }}
    steps:
      - id: set-hostnames
        run: |
          echo "matrix={\"${{ secrets.SERVERS_DEPLOY }}}" >> $GITHUB_OUTPUT        
#hostnames\":[\"a\",\"b\" secrets.SERVERS_DEPLOY

  cd:
      runs-on: ubuntu-latest
      needs: generate_matrix
      strategy:
        matrix: ${{fromJson(needs.generate_matrix.outputs.matrix)}}
      steps:    
        - name: deploy MESA DE AYUDA V1
          uses: appleboy/ssh-action@v1
          with:
            host: ${{ matrix.hostnames }}
            username: ${{ secrets.SSH_USER }}
            key: ${{ secrets.SSH_KEY }}
            script: |
              #!/bin/bash
              echo "Stopping Service..."
              
              sleep 1
              API=$(sudo docker container ls -a -q -f name=mesadeayuda )
              if [ ! -z $API ]
              then
                sudo docker stop $API
                sudo docker rm $API
                echo "Service stopped..."
              fi
              sleep 1
              echo "Starting service with new version..."
              NETWORK_COPCSA=$(sudo docker network ls -q -f name=copcsa )
              if [  -z $NETWORK_COPCSA ]
              then
                sudo docker network create -d bridge copcsa
                echo "Creating new network..."
              fi
              
              echo  The server deploy are ${{ matrix.hostnames }}  
              HELPDESK=$(sudo docker run --network=copcsa --name mesadeayuda -d -p 8082:80 -e IMAGE_HASH=${{ github.sha }} ${{ secrets.DOCKER_USER }}/mesadeayuda:${{ github.sha }})
              echo "Service has started"
              sleep 3
              echo "Container ID: $HELPDESK actualizado Vendors and Mailer"
              sudo docker exec mesadeayuda php composer.phar reinstall mongodb/mongodb -n --no-cache
              sudo docker exec mesadeayuda php composer.phar update -n --no-cache
              sudo docker exec mesadeayuda php bin/cake.php cache clear_all
              sleep 1
              sudo docker exec -u root mesadeayuda echo "3.220.40.148 helpdesk.copcsa.com" >> /etc/hosts
              echo "Updated hosts file."
              sleep 2
              echo "Service MESA DE AYUDA V1 deployed successfully."
